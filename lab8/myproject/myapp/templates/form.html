{% extends "base.html" %}

{% block title %}✎แบบฟอร์มบันทึกข้อมูลประชากร{% endblock %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #c6dffc, #ffffff, #A6C3E4);
        background-attachment: fixed;
        font-family: "Prompt", sans-serif;
    }

    .form-container {
        max-width: 600px;
        margin: 40px auto;
        padding: 30px;
        background: rgba(255, 255, 255, 0.85);
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        backdrop-filter: blur(10px);
    }

    .form-title {
        font-size: 26px;
        font-weight: bold;
        color: #78A3D4;
        margin-bottom: 20px;
        text-align: center;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    label {
        font-weight: bold;
        margin-top: 10px;
        display: block;
        color: #78A3D4;
    }

    input[type="text"],
    input[type="number"] {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        margin-top: 6px;
        border-radius: 8px;
        border: 1px solid #bfa38b;
        outline: none;
        transition: 0.2s;
    }

    input:focus {
        border-color: #78A3D4;
        box-shadow: 0 0 6px rgba(109, 76, 65, 0.5);
    }

    .btn-group {
        margin-top: 20px;
        text-align: center;
    }

    button {
        padding: 10px 18px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin: 5px;
        transition: 0.2s;
    }

    .btn-submit {
        background: #997062;
        color: white;
    }

    .btn-submit:hover {
        background: #78A3D4;
    }

    .btn-reset {
        background: #9DCAEB;
        color: white;
    }

    .btn-reset:hover {
        background: #9DCAEB;
    }
</style>

<div class="form-container">

    <h2 class="form-title">✎แบบฟอร์มบันทึกข้อมูลประชากร</h2>

    <form>
        <label>ชื่อประชากร</label>
        <input type="text" placeholder="กรุณากรอกชื่อ-นามสกุล">

        <label>อายุ</label>
        <input type="number" placeholder="กรอกข้อมูลอายุเป็นตัวเลข">

        <div class="btn-group">
            <button type="submit" class="btn-submit">ลงทะเบียน</button>
            <button type="reset" class="btn-reset">ล้างข้อมูล</button>
        </div>
    </form>

</div>

{% endblock %}
