<!DOCTYPE html>
<html>
<head>
    <title>ข้อมูลบุคคล</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
     href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        .btn-pink {
            background-color: #ff69b4;
            color: white;
        }
        .btn-orange {
            background-color: #ffa500;
            color: white;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>

<body class="p-5">

<h2 class="mb-4">ข้อมูลบุคคล</h2>

<!-- เพิ่ม table-hover ตามงาน -->
<table class="table table-bordered table-hover">
    <thead class="table-light">
        <tr>
            <th>ชื่อ</th>
            <th>อายุ</th>
            <th>วันที่บันทึก</th>
            <th class="text-center">รายละเอียด</th>
        </tr>
    </thead>

    <tbody>
        {% for p in persons %}
        <tr>
            <td>{{ p.name }}</td>
            <td>{{ p.age }}</td>
            <td>{{ p.date }}</td>

            <td>
                <div class="action-buttons">
                    <button class="btn btn-pink btn-sm">Edit</button>
                    <button class="btn btn-orange btn-sm">Delete</button>
                </div>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
