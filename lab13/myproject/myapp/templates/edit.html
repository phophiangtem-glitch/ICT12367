<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แก้ไขข้อมูลบุคคล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #dff2ff, #f3faff);
            font-family: 'Arial', sans-serif;
        }

        .navbar {
            background-color: #8cc2ff;
        }

        .navbar-brand {
            font-size: 32px;
            font-weight: bold;
            color: white;
        }

        .navbar-nav .nav-link {
            color: white;
            font-size: 16px;
        }

        .navbar-nav .nav-link:hover {
            background-color: #4fa9ef;
            border-radius: 5px;
        }

        .form-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 50px auto;
        }

        h3 {
            text-align: center;
            color: #004a80;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .form-control {
            border-radius: 12px;
            border: 1.5px solid #cce8ff;
            margin-bottom: 20px;
        }

        .form-control:focus {
            border-color: #4fa9ef;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.25);
        }

        .btn-primary {
            background-color: #7d9ada;
            border-color: #2563eb;
            padding: 12px 30px;
            font-size: 16px;
        }

        .btn-primary:hover {
            background-color: #4fa9ef;
            box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3);
        }

        .btn-secondary {
            background-color: #b6d8ff;
            border-color: #b6d8ff;
            padding: 12px 30px;
            font-size: 16px;
        }

        .btn-secondary:hover {
            background-color: #98c9ff;
        }

        .back-btn {
            margin-top: 20px;
            text-align: center;
        }

        .back-btn a {
            color: #004a80;
            text-decoration: none;
            font-weight: 600;
        }

        .back-btn a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">เว็บไซต์ตารางข้อมูล</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">หน้าหลัก</a>
                <a class="nav-link" href="/form/">ลงทะเบียน</a>
                <a class="nav-link" href="#">เกี่ยวกับเรา</a>
            </div>
        </div>
    </nav>

    <!-- Edit Form -->
    <div class="form-container">
        <h3>แก้ไขข้อมูลบุคคล</h3>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="name" class="form-label">ชื่อ</label>
                <input type="text" id="name" name="name" class="form-control" value="{{ person.name }}" required>
            </div>
            <div class="mb-3">
                <label for="age" class="form-label">อายุ</label>
                <input type="number" id="age" name="age" class="form-control" value="{{ person.age }}" required>
            </div>
            <div class="mb-3">
                <label for="detail" class="form-label">รายละเอียด</label>
                <textarea id="detail" name="detail" class="form-control" rows="4">{{ person.detail }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">บันทึก</button>
        </form>

        <div class="back-btn">
            <a href="/" class="btn btn-secondary w-100">⬅ กลับหน้าหลัก</a>
        </div>
    </div>

</body>
</html>
