<!-- myapp/templates/form.html -->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนข้อมูลบุคคล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* สีพื้นหลัง */
        body {
            background: linear-gradient(135deg, #dff2ff, #f3faff);
            font-family: 'Arial', sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: #8cc2ff;
        }

        .navbar-brand {
            font-size: 32px;
            font-weight: bold;
            color: white;
        }

        .navbar-nav .nav-link {
            color: white;
            font-size: 16px;
        }

        .navbar-nav .nav-link:hover {
            background-color: #4fa9ef;
            border-radius: 5px;
        }

        /* Branding Text */
        .branding-text {
            text-align: center;
            font-size: 50px;
            color: #004a80;
            font-weight: 700;
            margin-top: 60px;
        }

        .small-text {
            text-align: center;
            color: #004a80;
            font-size: 20px;
        }

        /* Table Styling */
        .table-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            max-width: 1100px;
            margin: auto;
            border: 1px solid #e3f4ff;
            margin-top: 50px;
        }

        h2 {
            text-align: center;
            color: #0d6efd;
            font-weight: 700;
            margin-bottom: 30px;
        }

        table {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        thead {
            background: #4fa9ef;
            color: white;
        }

        thead th {
            font-weight: bold;
        }

        tbody tr:hover {
            background: #f0f8ff;
        }

        td, th {
            padding: 15px;
            text-align: center;
            font-size: 16px;
        }

        /* เพิ่มปุ่มให้ดูดีขึ้น */
        .btn-primary, .btn-warning, .btn-danger {
            border-radius: 10px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #2563eb;
            box-shadow: 0 4px 8px rgba(0, 0, 255, 0.2);
        }

        .btn-warning:hover {
            background-color: #ffbf47;
            box-shadow: 0 4px 8px rgba(255, 191, 71, 0.3);
        }

        .btn-danger:hover {
            background-color: #e11d48;
            box-shadow: 0 4px 8px rgba(225, 29, 72, 0.3);
        }

        /* เพิ่มฟังก์ชันปรับปรุงปุ่มบนแถบ */
        .add-btn {
            background-color: #2563eb;
            border: none;
            border-radius: 10px;
            padding: 12px 25px;
            color: white;
            font-weight: 600;
            transition: 0.3s;
            font-size: 16px;
        }

        .add-btn:hover {
            background-color: #4fa9ef;
            box-shadow: 0 4px 10px rgba(0, 0, 255, 0.2);
        }
    </style>
    
</head>
<body style="background:#eaf6ff;">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">เว็บไซต์ตารางข้อมูล</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">หน้าหลัก</a>
                <a class="nav-link" href="/form/">ลงทะเบียน</a>
                <a class="nav-link" href="#">เกี่ยวกับเรา</a>
            </div>
        </div>
    </nav>

    <!-- Form Content -->
    <div class="container mt-5 p-4 bg-white shadow rounded" style="max-width:600px;">
        <h3 class="text-center text-primary mb-4">ลงทะเบียนข้อมูลบุคคล</h3>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">ชื่อประชากร</label>
                <input type="text" class="form-control" name="name" placeholder="กรอกชื่อ-นามสกุล" required>
            </div>

            <div class="mb-3">
                <label class="form-label">อายุ</label>
                <input type="number" class="form-control" name="age" placeholder="กรอกอายุเป็นตัวเลข" required>
            </div>

            <div class="mb-3">
                <label class="form-label">รายละเอียด</label>
                <textarea class="form-control" name="detail"></textarea>
            </div>

            <div class="d-flex gap-3 mt-4">
                <button class="btn btn-primary w-50">ลงทะเบียน</button>
                <button class="btn btn-warning w-50" type="reset">ล้างข้อมูล</button>
            </div>

            <div class="text-center mt-3">
                <a href="/" class="btn btn-secondary" style="background:#b6d8ff; border:none; border-radius:10px;">
                    ⬅ กลับหน้าหลัก
                </a>
            </div>
        </form>
    </div>

</body>
</html>
